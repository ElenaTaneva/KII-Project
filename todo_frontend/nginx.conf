server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files \ \/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://10.101.111.9:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
    }
}
