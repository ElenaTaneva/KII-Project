name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./todo_backend
        run: npm install

      - name: Run backend tests
        working-directory: ./todo_backend
        run: npm test || true

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./todo_backend
          push: true
          tags: etaneva/todo-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./todo_frontend
          push: true
          tags: etaneva/todo-frontend:latest

  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Pipeline completed
        run: echo "Pipeline completed successfully! Images pushed to DockerHub."
